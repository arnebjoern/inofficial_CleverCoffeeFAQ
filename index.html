<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverCoffee FAQ Suche</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    
    <style>
        /* Modernes, App-ähnliches Design */
        :root {
            --primary: #4f46e5; 
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --highlight: #fef08a;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 60px 20px; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            line-height: 1.6;
            min-height: 100vh;
        }

        h1 { 
            text-align: center; 
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 40px; 
            color: #111827;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        
        .search-wrapper { position: relative; margin-bottom: 24px; }

        #searchBox { 
            width: 100%; 
            padding: 20px 20px 20px 55px; 
            font-size: 18px; 
            background: var(--surface);
            border: 2px solid transparent; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md);
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease;
            color: var(--text-main);
        }
        
        #searchBox::placeholder { color: #9ca3af; }
        #searchBox:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15), var(--shadow-md); }

        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; color: #9ca3af; pointer-events: none; }
        
        #categories { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; justify-content: center; }
        
        .filter-btn { background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius-full); cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
        .filter-btn:hover { border-color: #d1d5db; color: var(--text-main); transform: translateY(-1px); }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        .faq-item { background: var(--surface); border-radius: var(--radius-lg); margin-bottom: 16px; border: 1px solid var(--border); transition: all 0.3s ease; box-shadow: var(--shadow-sm); scroll-margin-top: 100px; }
        .faq-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: #d1d5db; }
        .faq-item.target-highlight { animation: pulse-border 2s ease-out; }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); border-color: var(--primary); }
            70% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); border-color: var(--border); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        .faq-header { padding: 20px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: var(--radius-lg); }
        .faq-header-content { display: flex; flex-direction: column; gap: 8px; padding-right: 20px; flex-grow: 1; }
        .faq-meta { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        
        .tag { background: #f3f4f6; color: #4b5563; padding: 3px 8px; border-radius: 6px; font-size: 10px; display: inline-flex; align-items: center; gap: 4px; }
        .tag-version { background: #e0e7ff; color: #3730a3; border: 1px solid #c7d2fe; }

        .faq-question { font-weight: 700; font-size: 1.1rem; margin: 0; color: var(--text-main); line-height: 1.4; }

        .faq-actions { display: flex; align-items: center; gap: 15px; }
        .copy-btn { background: transparent; border: none; color: #9ca3af; cursor: pointer; padding: 8px; border-radius: 8px; transition: all 0.2s; opacity: 0; display: flex; align-items: center; justify-content: center; }
        .faq-header:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #f3f4f6; color: var(--primary); }
        .copy-btn svg { width: 18px; height: 18px; }

        .faq-arrow { width: 10px; height: 10px; border-right: 2.5px solid #9ca3af; border-bottom: 2.5px solid #9ca3af; transform: rotate(45deg); transition: transform 0.3s ease; margin-right: 5px; }
        .faq-header.active .faq-arrow { transform: rotate(-135deg); }
        
        .faq-answer-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
        .faq-answer-wrapper.show { grid-template-rows: 1fr; }
        .faq-answer-inner { overflow: hidden; }
        .faq-answer { padding: 0 24px 24px 24px; line-height: 1.7; color: #4b5563; font-size: 16px; }
        
        .faq-details { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border); display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; }
        .detail-item { background: #f9fafb; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; display: flex; align-items: center; gap: 6px; }
        .detail-label { font-weight: 600; color: #374151; }
        .detail-value { font-weight: 600; color: var(--text-main); }

        mark { background-color: var(--highlight); padding: 0.1em 0.3em; border-radius: 4px; color: #000; font-weight: 500; }
        .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius-lg); border: 2px dashed #d1d5db; font-weight: 500; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111827; color: white; padding: 12px 24px; border-radius: var(--radius-full); font-weight: 600; font-size: 14px; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Lade-Indikator */
        #loader { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

    <h1>☕ CleverCoffee FAQ</h1>
    
    <div class="search-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" id="searchBox" placeholder="Suche nach Begriffen, Personen oder Kanälen..." disabled>
    </div>
    
    <div id="categories"></div>
    <div id="loader">Lade Daten & Versions-Historie... 🔄</div>
    <div id="results"></div>

    <div id="toast">✅ Link kopiert!</div>

    <script>
        const fuseOptions = {
            keys: ['Frage', 'Antwort', 'Kategorie', 'Fragesteller', 'Antwort-Autor', 'Kanal'],
            threshold: 0.3, 
            ignoreLocation: true,
            minMatchCharLength: 2,
            includeMatches: true
        };

        const searchBox = document.getElementById('searchBox');
        const resultsContainer = document.getElementById('results');
        const categoriesContainer = document.getElementById('categories');
        const loader = document.getElementById('loader');
        const toast = document.getElementById('toast');
        
        let fuse;
        let faqData = [];
        let githubReleases = [];
        let currentCategory = 'Alle';
        let debounceTimer;
        let isFirstLoad = true;

        // Keywords, um veraltete Fragen automatisch rauszufiltern
        const obsoleteKeywords = ['gefixt', 'fixed in', 'pr #', 'behoben in', 'obsolete', 'bugfix'];

        function isObsolete(text) {
            const lowerText = text.toLowerCase();
            return obsoleteKeywords.some(keyword => lowerText.includes(keyword));
        }

        // Parallel beide Datenquellen abrufen (FAQ-JSON und GitHub API)
        Promise.all([
            fetch('faq-daten.json').then(res => res.json()),
            fetch('https://api.github.com/repos/rancilio-pid/clevercoffee/releases')
                .then(res => res.json())
                .catch(err => {
                    console.warn("GitHub API Limit erreicht oder Offline. Versionen werden ignoriert.");
                    return []; 
                })
        ])
        .then(([faqJson, releasesData]) => {
            // GitHub Releases nach Datum sortieren (Neueste zuerst)
            if (Array.isArray(releasesData)) {
                githubReleases = releasesData.map(r => ({
                    version: r.tag_name,
                    date: new Date(r.published_at)
                })).sort((a, b) => b.date - a.date);
            }

            // FAQ-Daten filtern und aufbereiten
            faqData = faqJson.filter(item => {
                // 1. Veraltete Bugs direkt aus der Liste werfen
                if (isObsolete(item.Antwort)) return false;
                return true;
            });

            // Suchmaschine & UI starten
            loader.style.display = 'none';
            searchBox.disabled = false;
            fuse = new Fuse(faqData, fuseOptions);
            renderCategoryButtons();
            updateResults();
        })
        .catch(error => {
            loader.style.display = 'none';
            resultsContainer.innerHTML = '<div class="no-results" style="color:#ef4444; border-color:#fca5a5;">Fehler beim Laden der FAQ-Daten.</div>';
        });

        // Berechnet die zum Zeitpunkt der Frage aktuelle Version
        function getVersionForDate(dateString) {
            if (githubReleases.length === 0 || !dateString) return null;
            
            // "2023-12-23 16:18:27" für Safari/Firefox kompatibel machen
            const faqDate = new Date(dateString.replace(' ', 'T'));
            
            // Finde das erste Release, das VOR der Frage veröffentlicht wurde
            const activeRelease = githubReleases.find(r => r.date <= faqDate);
            return activeRelease ? activeRelease.version : 'Veraltet';
        }

        function generateSlug(text) {
            return text.toString().toLowerCase()
                .replace(/[äöüß]/g, m => ({'ä':'ae','ö':'oe','ü':'ue','ß':'ss'})[m])
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)+/g, '');
        }

        function renderCategoryButtons() {
            const categories = ['Alle', ...new Set(faqData.map(item => item.Kategorie).filter(Boolean))];
            categoriesContainer.innerHTML = categories.map(cat => 
                `<button class="filter-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategoryButtons(); 
            updateResults(); 
        }

        function highlightText(text, matches, keyName) {
            if (!text) return '';
            if (!matches) return text;
            const match = matches.find(m => m.key === keyName);
            if (!match) return text;

            let result = '';
            let lastEnd = 0;
            match.indices.forEach(([start, end]) => {
                result += text.substring(lastEnd, start);
                result += `<mark>${text.substring(start, end + 1)}</mark>`;
                lastEnd = end + 1;
            });
            result += text.substring(lastEnd);
            return result;
        }

        function toggleFaq(headerElement) {
            headerElement.classList.toggle('active');
            headerElement.nextElementSibling.classList.toggle('show');
        }

        function copyLink(event, slug) {
            event.stopPropagation(); 
            const url = window.location.origin + window.location.pathname + '#' + slug;
            navigator.clipboard.writeText(url).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        function formatDateTime(datumString) {
            if (!datumString) return 'Unbekannt';
            const parts = datumString.split(' ');
            if (parts.length === 2) {
                const dateParts = parts[0].split('-');
                const timeParts = parts[1].split(':');
                if (dateParts.length === 3 && timeParts.length >= 2) {
                    return `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}, ${timeParts[0]}:${timeParts[1]} Uhr`;
                }
            }
            return datumString; 
        }

        function updateResults() {
            const query = searchBox.value.trim();
            let resultsToRender = [];

            if (query === '') {
                resultsToRender = faqData.map(item => ({ item: item, matches: [] }));
            } else {
                resultsToRender = fuse.search(query);
            }

            if (currentCategory !== 'Alle') {
                resultsToRender = resultsToRender.filter(res => res.item.Kategorie === currentCategory);
            }

            resultsContainer.innerHTML = ''; 
            
            if(resultsToRender.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Keine passenden Antworten gefunden. Versuch es mit einem anderen Suchbegriff.</div>';
                return;
            }

            resultsToRender.forEach(res => {
                const data = res.item;
                const matches = res.matches;
                const slug = generateSlug(data.Frage); 
                
                const highlightedQuestion = query ? highlightText(data.Frage, matches, 'Frage') : data.Frage;
                const highlightedAnswer = query ? highlightText(data.Antwort, matches, 'Antwort') : data.Antwort;
                
                const datumUhrzeit = formatDateTime(data.Datum);
                const kanal = data.Kanal ? highlightText(data.Kanal, matches, 'Kanal') : 'Unbekannt';
                const fragesteller = data.Fragesteller ? highlightText(data.Fragesteller, matches, 'Fragesteller') : 'Anonym';
                const autor = data['Antwort-Autor'] ? highlightText(data['Antwort-Autor'], matches, 'Antwort-Autor') : 'Community';
                
                // Hole die GitHub Version
                const version = getVersionForDate(data.Datum);
                const versionHtml = version ? `<span class="tag tag-version" title="Aktuelle Version zum Zeitpunkt der Frage">📦 ${version}</span>` : '';

                const faqElement = document.createElement('div');
                faqElement.className = 'faq-item';
                faqElement.id = slug; 
                
                const isActive = query ? 'active' : '';
                const isShow = query ? 'show' : '';

                faqElement.innerHTML = `
                    <div class="faq-header ${isActive}" onclick="toggleFaq(this)">
                        <div class="faq-header-content">
                            <span class="faq-meta">
                                ${data.Kategorie}
                                <span class="tag">#${kanal}</span>
                                ${versionHtml}
                            </span>
                            <h2 class="faq-question">${highlightedQuestion}</h2>
                        </div>
                        <div class="faq-actions">
                            <button class="copy-btn" onclick="copyLink(event, '${slug}')" title="Direktlink kopieren">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            </button>
                            <div class="faq-arrow"></div>
                        </div>
                    </div>
                    <div class="faq-answer-wrapper ${isShow}">
                        <div class="faq-answer-inner">
                            <div class="faq-answer">
                                ${highlightedAnswer}
                                
                                <div class="faq-details">
                                    <div class="detail-item" title="Wann wurde das gefragt?"><span class="detail-label">🕒 Zeit:</span> <span class="detail-value">${datumUhrzeit}</span></div>
                                    <div class="detail-item"><span class="detail-label">👤 Von:</span> <span class="detail-value">${fragesteller}</span></div>
                                    <div class="detail-item"><span class="detail-label">💬 Antwort:</span> <span class="detail-value">${autor}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(faqElement);
            });

            if (isFirstLoad) {
                checkUrlHashAndScroll();
                isFirstLoad = false;
            }
        }

        function checkUrlHashAndScroll() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                setTimeout(() => {
                    const targetElement = document.getElementById(hash);
                    if (targetElement) {
                        const header = targetElement.querySelector('.faq-header');
                        header.classList.add('active');
                        targetElement.querySelector('.faq-answer-wrapper').classList.add('show');
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetElement.classList.add('target-highlight');
                    }
                }, 100);
            }
        }

        searchBox.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updateResults();
            }, 150); 
        });
    </script>
</body>
</html>
