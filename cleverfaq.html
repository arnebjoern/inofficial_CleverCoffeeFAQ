<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverCoffee FAQ Suche</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    
    <style>
        /* Modernes, App-ähnliches Design */
        :root {
            --primary: #4f46e5; /* Modernes Indigo */
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --highlight: #fef08a;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 60px 20px; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            line-height: 1.6;
            min-height: 100vh;
        }

        h1 { 
            text-align: center; 
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 40px; 
            color: #111827;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        
        /* Suchfeld */
        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        #searchBox { 
            width: 100%; 
            padding: 20px 20px 20px 55px; 
            font-size: 18px; 
            background: var(--surface);
            border: 2px solid transparent; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md);
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-main);
        }
        
        #searchBox::placeholder { color: #9ca3af; }
        
        #searchBox:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15), var(--shadow-md);
        }

        /* SVG Lupe */
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            color: #9ca3af;
            pointer-events: none;
        }
        
        /* Kategorie Buttons (Pills) */
        #categories { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 40px; 
            justify-content: center; 
        }
        
        .filter-btn { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 10px 20px; 
            border-radius: var(--radius-full); 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            color: var(--text-muted); 
            transition: all 0.2s ease; 
            box-shadow: var(--shadow-sm);
        }
        
        .filter-btn:hover { 
            border-color: #d1d5db;
            color: var(--text-main);
            transform: translateY(-1px);
        }
        
        .filter-btn.active { 
            background: var(--primary); 
            border-color: var(--primary);
            color: white; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        /* FAQ Einträge */
        .faq-item { 
            background: var(--surface); 
            border-radius: var(--radius-lg); 
            margin-bottom: 16px; 
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            scroll-margin-top: 100px; /* Damit der Anker-Link nicht unter dem Bildschirmrand klebt */
        }

        .faq-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: #d1d5db;
        }

        /* Highlight-Animation, wenn man über einen Link kommt */
        .faq-item.target-highlight {
            animation: pulse-border 2s ease-out;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); border-color: var(--primary); }
            70% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); border-color: var(--border); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        .faq-header { 
            padding: 20px 24px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-radius: var(--radius-lg);
        }

        .faq-header-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 20px; 
            flex-grow: 1;
        }

        .faq-meta { 
            font-size: 12px; 
            font-weight: 700;
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        .faq-question { 
            font-weight: 700; 
            font-size: 1.1rem; 
            margin: 0; 
            color: var(--text-main); 
            line-height: 1.4;
        }

        /* Rechte Seite im Header: Copy Button & Pfeil */
        .faq-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Der Copy-Link Button */
        .copy-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            opacity: 0; /* Nur sichtbar beim Hovern */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .faq-header:hover .copy-btn { opacity: 1; }
        
        .copy-btn:hover {
            background: #f3f4f6;
            color: var(--primary);
        }

        .copy-btn svg { width: 18px; height: 18px; }

        /* Der animierte Pfeil */
        .faq-arrow {
            width: 10px;
            height: 10px;
            border-right: 2.5px solid #9ca3af;
            border-bottom: 2.5px solid #9ca3af;
            transform: rotate(45deg);
            transition: transform 0.3s ease;
            margin-right: 5px;
        }

        .faq-header.active .faq-arrow { transform: rotate(-135deg); }
        
        /* Antwort Bereich */
        .faq-answer-wrapper { 
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
        }
        
        .faq-answer-wrapper.show { 
            grid-template-rows: 1fr;
        }

        .faq-answer-inner {
            overflow: hidden;
        }

        .faq-answer { 
            padding: 0 24px 24px 24px;
            line-height: 1.7; 
            color: #4b5563; 
            font-size: 16px;
        }
        
        mark { 
            background-color: var(--highlight); 
            padding: 0.1em 0.3em; 
            border-radius: 4px; 
            color: #000; 
            font-weight: 500;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 2px dashed #d1d5db;
            font-weight: 500;
        }

        /* Toast Benachrichtigung (Link kopiert) */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111827;
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Mobil-Optimierung */
        @media (max-width: 600px) {
            .copy-btn { opacity: 1; } /* Auf dem Handy immer anzeigen */
        }
    </style>
</head>
<body>

    <h1>☕ CleverCoffee FAQ</h1>
    
    <div class="search-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" id="searchBox" placeholder="Suche nach Schaltplan, MQTT, PID-Werten...">
    </div>
    
    <div id="categories"></div>
    <div id="results"></div>

    <div id="toast">✅ Link kopiert!</div>

    <script>
        const fuseOptions = {
            keys: ['Frage', 'Antwort', 'Kategorie'],
            threshold: 0.3, 
            ignoreLocation: true,
            minMatchCharLength: 2,
            includeMatches: true
        };

        const searchBox = document.getElementById('searchBox');
        const resultsContainer = document.getElementById('results');
        const categoriesContainer = document.getElementById('categories');
        const toast = document.getElementById('toast');
        
        let fuse;
        let faqData = [];
        let currentCategory = 'Alle';
        let debounceTimer;
        let isFirstLoad = true;

        // Erstellt einen sauberen URL-Slug aus der Frage (z.B. "Wie geht das?" -> "wie-geht-das")
        function generateSlug(text) {
            return text.toString().toLowerCase()
                .replace(/[äöüß]/g, m => ({'ä':'ae','ö':'oe','ü':'ue','ß':'ss'})[m])
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)+/g, '');
        }

        fetch('faq-daten.json')
            .then(response => response.json())
            .then(data => {
                faqData = data;
                fuse = new Fuse(faqData, fuseOptions);
                renderCategoryButtons();
                updateResults(); 
            })
            .catch(error => {
                resultsContainer.innerHTML = '<div class="no-results" style="color:#ef4444; border-color:#fca5a5;">Fehler beim Laden der FAQ-Daten. Hast du einen lokalen Server gestartet?</div>';
            });

        function renderCategoryButtons() {
            const categories = ['Alle', ...new Set(faqData.map(item => item.Kategorie).filter(Boolean))];
            categoriesContainer.innerHTML = categories.map(cat => 
                `<button class="filter-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategoryButtons(); 
            updateResults(); 
        }

        function highlightText(text, matches, keyName) {
            if (!matches) return text;
            const match = matches.find(m => m.key === keyName);
            if (!match) return text;

            let result = '';
            let lastEnd = 0;
            match.indices.forEach(([start, end]) => {
                result += text.substring(lastEnd, start);
                result += `<mark>${text.substring(start, end + 1)}</mark>`;
                lastEnd = end + 1;
            });
            result += text.substring(lastEnd);
            return result;
        }

        function toggleFaq(headerElement) {
            headerElement.classList.toggle('active');
            headerElement.nextElementSibling.classList.toggle('show');
        }

        function copyLink(event, slug) {
            event.stopPropagation(); // Verhindert, dass das Accordion auf/zu klappt
            const url = window.location.origin + window.location.pathname + '#' + slug;
            
            navigator.clipboard.writeText(url).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        function updateResults() {
            const query = searchBox.value.trim();
            let resultsToRender = [];

            if (query === '') {
                resultsToRender = faqData.map(item => ({ item: item, matches: [] }));
            } else {
                resultsToRender = fuse.search(query);
            }

            if (currentCategory !== 'Alle') {
                resultsToRender = resultsToRender.filter(res => res.item.Kategorie === currentCategory);
            }

            resultsContainer.innerHTML = ''; 
            
            if(resultsToRender.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Keine passenden Antworten gefunden. Versuch es mit einem anderen Suchbegriff.</div>';
                return;
            }

            resultsToRender.forEach(res => {
                const data = res.item;
                const matches = res.matches;
                const slug = generateSlug(data.Frage); // Slug generieren
                
                const highlightedQuestion = query ? highlightText(data.Frage, matches, 'Frage') : data.Frage;
                const highlightedAnswer = query ? highlightText(data.Antwort, matches, 'Antwort') : data.Antwort;

                const faqElement = document.createElement('div');
                faqElement.className = 'faq-item';
                faqElement.id = slug; // ID für den direkten Link setzen
                
                const isActive = query ? 'active' : '';
                const isShow = query ? 'show' : '';

                // Das SVG Icon ist das kleine "Link" Symbol
                faqElement.innerHTML = `
                    <div class="faq-header ${isActive}" onclick="toggleFaq(this)">
                        <div class="faq-header-content">
                            <span class="faq-meta">${data.Kategorie}</span>
                            <h2 class="faq-question">${highlightedQuestion}</h2>
                        </div>
                        <div class="faq-actions">
                            <button class="copy-btn" onclick="copyLink(event, '${slug}')" title="Direktlink kopieren">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            </button>
                            <div class="faq-arrow"></div>
                        </div>
                    </div>
                    <div class="faq-answer-wrapper ${isShow}">
                        <div class="faq-answer-inner">
                            <div class="faq-answer">${highlightedAnswer}</div>
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(faqElement);
            });

            // Wenn die Seite das erste Mal lädt, checken wir, ob jemand über einen Direktlink gekommen ist
            if (isFirstLoad) {
                checkUrlHashAndScroll();
                isFirstLoad = false;
            }
        }

        // Sucht die Frage zum Hash in der URL, klappt sie auf und scrollt dorthin
        function checkUrlHashAndScroll() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const targetElement = document.getElementById(hash);
                if (targetElement) {
                    const header = targetElement.querySelector('.faq-header');
                    header.classList.add('active');
                    targetElement.querySelector('.faq-answer-wrapper').classList.add('show');
                    
                    // Weich hinscrollen und kurz aufblinken lassen
                    setTimeout(() => {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetElement.classList.add('target-highlight');
                    }, 100);
                }
            }
        }

        searchBox.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updateResults();
            }, 150); 
        });
    </script>
</body>
</html>
